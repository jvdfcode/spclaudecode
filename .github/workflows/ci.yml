name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      # Veto TD-001-5: react/types-react majors precisam casar
      - name: Check react/@types/react majors aligned
        run: pnpm check:react-types-major

      # Veto TD-001-5: 100 cenários × 20 chamadas paralelas com limit=5
      # nunca podem ultrapassar o limite (DEBT-DB-H3 garantido)
      - name: Check rate-limit concurrency invariant
        run: pnpm check:rate-limit-concurrency

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload concurrency check artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: concurrency-check
          path: tests/output/concurrency-check.json
          retention-days: 7
          if-no-files-found: ignore

  # Veto TD-001-5: Lighthouse A11y >= 90 em rotas públicas chave.
  # Roda em paralelo ao job ci principal para não atrasar feedback.
  lighthouse:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Lighthouse CI
        run: |
          pnpm dlx @lhci/cli@0.14.x autorun \
            --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  db-types-drift:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate types from remote schema
        run: supabase gen types typescript --project-id ltpdqavqhraphoyusmdi > /tmp/supabase.gen.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for type drift
        run: |
          if ! diff -q src/types/supabase.gen.ts /tmp/supabase.gen.ts > /dev/null 2>&1; then
            echo "❌ DB type drift detected — src/types/supabase.gen.ts está desatualizado."
            echo "Execute 'pnpm generate:types' e commite o arquivo atualizado."
            diff src/types/supabase.gen.ts /tmp/supabase.gen.ts
            exit 1
          fi
          echo "✅ Tipos DB em sincronia com o schema remoto."
