epic:
  id: EPIC-04
  title: "Central de SKUs"
  status: ready
  priority: 4
  prd_ref: docs/prd/07-epic-03-04.md

  objective: >
    Transformar o SmartPreço de uma calculadora avulsa em uma ferramenta de portfólio.
    O vendedor salva produtos calculados como SKUs, acompanha o status de viabilidade
    de cada um ao longo do tempo e tem visão consolidada do portfólio com filtros
    por status (Viável, Atenção, Não viável, À venda).

  acceptance_criteria:
    - Botão "Salvar como SKU" funcional após cálculo completo
    - SKUs persistidos no Supabase com RLS (cada usuário vê só os seus)
    - Grid de cards com nome, margem, preço e badge de status colorido
    - Filtros por status, busca por nome, ordenação por margem/data
    - Página de detalhe com histórico de versões do cálculo
    - Status calculado automaticamente: Viável (≥20%), Atenção (10-19%), Não viável (<10%)

  stories:
    - id: "4.1"
      title: "Salvar SKU após Cálculo"
      status: draft
      agent: "@dev"
      estimated_effort: M
      dependencies: ["2.3"]

    - id: "4.2"
      title: "Central de SKUs com Status"
      status: draft
      agent: "@dev"
      estimated_effort: M
      dependencies: ["4.1"]

    - id: "4.3"
      title: "Detalhe e Histórico do SKU"
      status: draft
      agent: "@dev"
      estimated_effort: M
      dependencies: ["4.2"]

  execution:
    wave_1: ["4.1"]
    wave_2: ["4.2"]
    wave_3: ["4.3"]

  tech_notes:
    - "Schema Supabase: tabelas 'skus' e 'sku_calculations'"
    - "skus: id, user_id, name, notes, status, created_at, updated_at"
    - "sku_calculations: id, sku_id, cost_data (jsonb), result_data (jsonb), created_at"
    - "RLS: todas as tabelas com policy user_id = auth.uid()"
    - "Status: computed field ou view no Supabase baseado na última calculation"
    - "Histórico: sku_calculations ordenado por created_at DESC"

  quality_gates:
    - "RLS testado: usuário A não acessa SKUs do usuário B"
    - "Salvar SKU funcional com dados completos preservados"
    - "Status calculado corretamente para todos os thresholds"
    - "Grid responsivo em desktop e tablet"
    - "Deleção de SKU com confirmação modal"

  created_at: "2026-04-20"
  created_by: "@pm"
