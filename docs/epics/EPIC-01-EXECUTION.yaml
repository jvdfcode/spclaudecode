epic:
  id: EPIC-01
  title: "Fundação & Infraestrutura"
  status: ready
  priority: 1
  prd_ref: docs/prd/06-epic-01-02.md

  objective: >
    Criar a base técnica completa do SmartPreço: repositório Next.js configurado,
    Supabase conectado, autenticação funcionando, CI/CD ativo e aplicação deployada
    em Vercel com página inicial acessível. Ao final, qualquer membro do squad
    consegue rodar localmente e fazer deploy em produção.

  acceptance_criteria:
    - Next.js 14+ com App Router, TypeScript, Tailwind e shadcn/ui configurados
    - Supabase Auth funcional com email/senha e RLS habilitado
    - GitHub Actions executando lint + typecheck + test em cada PR
    - Deploy automático na Vercel a cada merge na main
    - Layout base com navegação (Dashboard, Nova Análise, Meus SKUs)
    - Projeto rodando localmente com npm run dev sem erros

  stories:
    - id: "1.1"
      title: "Setup do Projeto Next.js + Supabase"
      status: draft
      agent: "@dev"
      estimated_effort: M
      dependencies: []

    - id: "1.2"
      title: "Autenticação com Supabase Auth"
      status: draft
      agent: "@dev"
      estimated_effort: M
      dependencies: ["1.1"]

    - id: "1.3"
      title: "CI/CD + Deploy em Produção"
      status: draft
      agent: "@dev"
      estimated_effort: S
      dependencies: ["1.1"]

    - id: "1.4"
      title: "Estrutura de Navegação e Layout Base"
      status: draft
      agent: "@dev"
      estimated_effort: M
      dependencies: ["1.2"]

  execution:
    wave_1: ["1.1"]
    wave_2: ["1.2", "1.3"]
    wave_3: ["1.4"]

  tech_notes:
    - "Stack: Next.js 14 App Router + Tailwind + shadcn/ui"
    - "Auth: Supabase Auth com middleware de proteção de rotas"
    - "Deploy: Vercel (connected to GitHub main branch)"
    - "Variáveis: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY"

  quality_gates:
    - "npm run lint -- zero errors"
    - "npm run typecheck -- zero errors"
    - "npm run build -- successful"
    - "Supabase connection validated"
    - "Auth flow tested manually (signup, login, logout, redirect)"

  created_at: "2026-04-20"
  created_by: "@pm"
