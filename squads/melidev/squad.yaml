routing_matrix:
  - trigger: "API, OAuth, webhook, endpoint, código, integração, SDK, rate limit, refresh token"
    routes_to: "@melidev"
  - trigger: "vender mais, anúncio, título, Buy Box, Mercado Ads, campanha, kit, variação, Full vs Flex, ranqueamento, ACOS"
    routes_to: "@meli-strategist"
  - trigger: "reputação, suspensão, mediação, claim, infração, advertência, recurso, CDC, bloqueio, dinheiro retido, advogado"
    routes_to: "@meli-ops"
  - trigger: "Pedido cruzado (ex: criar anúncio via API que ranqueie melhor)"
    routes_to: "Pipeline: @meli-strategist → @melidev"
  - trigger: "Mercado Pago, Shopee, Amazon, Magalu, outros marketplaces"
    routes_to: "Out of scope — handoff externo ou aviso de squad ausente"

