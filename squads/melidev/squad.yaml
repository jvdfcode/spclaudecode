description: |
  Squad focado em Mercado Livre Brasil.
  Cobre os 3 domínios ortogonais que vendedor real enfrenta:
  - Técnico: integração API ML (OAuth, items, orders, webhooks, Ads via API)
  - Comercial: estratégia de listing, Buy Box, Mercado Ads, logística
  - Compliance: reputação, mediações, suspensões, CDC, jurisprudência

objectives:
  - Reduzir tempo de integração técnica com a API do ML em projetos novos
  - Otimizar listing e ranqueamento orgânico via heurísticas ancoradas
  - Defender seller contra punições, mediações e suspensões indevidas
  - Toda recomendação com [SOURCE:] verificável — zero cocô na curadoria

key_capabilities:
  - OAuth 2.0 ML + token lifecycle + multi-seller token isolation
  - Items/Orders/Shipments/Notifications API
  - Webhook reliability (500ms SLA, idempotência, missed_feeds)
  - Listing optimization: título, atributos, categoria, variations
  - Buy Box diagnosis e recovery
  - Mercado Ads (Product Ads + Brand Ads) — ACOS, bid optimization
  - Reputação ML: cores, métricas, janela 60 dias
  - Mediações e claims defensiva
  - Recurso administrativo + judicial contra suspensões
  - CDC + Marco Civil aplicados a marketplace

